<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>批量操作 + 数据导出</title>
<link rel="icon" href="logo.jpg" type="image/jpeg">
<style>:root{--purple:#7c6ef0;--muted:#8888aa;--bg:#0c0c1d;--card:#14142b;--text:#e8e8f0;--ts:#9090b0;--ac:#6c5ce7;--br:#2a2a4a;--gn:#00b894;--am:#fdcb6e;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
h1{font-size:1.6em;margin:10px 0}.sub{color:var(--ts);font-size:.9em;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--br);border-radius:14px;padding:20px;margin-bottom:16px}
.card h3{font-size:1.1em;margin-bottom:12px}
table{width:100%;font-size:.85em;border-collapse:collapse}
th{text-align:left;padding:6px 8px;color:var(--ts);border-bottom:1px solid var(--br);font-weight:500}
td{padding:8px;border-bottom:1px solid rgba(42,42,74,.4)}
td input[type=checkbox]{margin-right:6px}
.badge{padding:2px 8px;border-radius:4px;font-size:.72em}
.b-open{background:rgba(0,184,148,.15);color:var(--gn)}.b-match{background:rgba(253,203,110,.15);color:var(--am)}
.bar{display:flex;gap:8px;margin:12px 0;align-items:center}.bar select{padding:6px 10px;border-radius:6px;border:1px solid var(--br);background:var(--card);color:var(--text);font-size:.85em}
.btn{padding:8px 18px;border-radius:8px;font-size:.9em;font-weight:600;cursor:pointer;border:none}.btn-p{background:var(--ac);color:#fff}.btn-o{background:transparent;border:1px solid var(--br);color:var(--text)}
.msg{padding:10px;border-radius:8px;margin:10px 0;font-size:.85em}.msg-ok{background:rgba(0,184,148,.1);border:1px solid var(--gn);color:#9FE1CB}
.preview{background:#1a1a38;border-radius:8px;padding:12px;font-family:monospace;font-size:.78em;white-space:pre-wrap;color:#a29bfe;max-height:200px;overflow:auto;margin:10px 0}

@media(max-width:768px){
  nav{flex-direction:column;gap:10px;padding:12px}
  nav .links{flex-wrap:wrap;justify-content:center}
  .hero{padding:40px 16px 30px}
  .hero h1{font-size:28px}
  .stats{gap:16px;flex-wrap:wrap}
  .stats .stat .number{font-size:24px}
  .features,.agents-grid{grid-template-columns:1fr}
  .section{padding:30px 16px}
}

nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1100px;margin:0 auto;border-bottom:1px solid var(--border)}
nav .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px;color:var(--text);text-decoration:none}
nav .brand:hover{text-decoration:none}
nav .brand img{width:36px;height:36px;border-radius:8px}
nav .links{display:flex;gap:20px;align-items:center}
nav .links a{font-size:14px;color:var(--muted);transition:color .15s}
nav .links a:hover{color:var(--text);text-decoration:none}
nav .links .btn-nav{background:var(--purple);color:#fff;padding:7px 18px;border-radius:8px;font-size:14px;font-weight:500;transition:background .15s}
nav .links .btn-nav:hover{background:#8c7ef5;text-decoration:none;color:#fff}
footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}
footer .links{margin-bottom:12px;display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
footer .links a{color:var(--muted);font-size:13px}
footer .links a:hover{color:var(--text)}

</style>
<meta property="og:title" content="需求链平台 — AI 驱动创新基础设施">
<meta property="og:description" content="用 AI 助手自动匹配需求与供应商。注册即用，永久开源。">

<meta property="og:url" content="https://8.154.26.92:8080/">

<body>
<nav>
  <a class="brand" href="/">
    <img src="logo.jpg" alt="">
    需求链平台
  </a>
  <div class="links">
    <a href="demand_square.html">需求广场</a>
    <a href="forum.html">论坛</a>
    <a href="docs/tutorial.html">教程</a>
    <a href="login.html" class="btn-nav">登录</a>
  </div>
</nav>
<div class="container">
  <h1>批量操作</h1>
  <p class="sub">企业用户批量管理多条需求的状态——一键关闭、批量延伸、导出数据。</p>
  <div class="card">
    <div class="bar">
      <input type="checkbox" id="selectAll" onclick="toggleAll()">全选
      <select id="batchAction"><option value="">批量操作...</option><option value="close">标记为已关闭</option><option value="pause">暂停匹配</option><option value="resume">恢复匹配</option></select>
      <button class="btn btn-p" onclick="doBatch()">执行</button>
      <button class="btn btn-o" onclick="exportData('csv')">导出 CSV</button>
      <button class="btn btn-o" onclick="exportData('json')">导出 JSON</button>
    </div>
    <table id="demandTable">
      <tr><th><input type="checkbox" disabled></th><th>需求</th><th>状态</th><th>匹配数</th><th>创建时间</th></tr>
    </table>
    <div id="batchMsg"></div>
  </div>

  <div class="card">
    <h3>导出预览</h3>
    <div class="preview" id="exportPreview">选择一个格式然后点击导出...</div>
  </div>
</div>
<script>
const demands=[
  {id:"d001",title:"800°C高温管道裂缝检测传感器",status:"open",matches:3,created:"2026-06-01"},
  {id:"d002",title:"新型碳纤维复合材料轻量化车身",status:"matching",matches:5,created:"2026-05-28"},
  {id:"d003",title:"AI驱动的蛋白质折叠加速算法",status:"in_progress",matches:7,created:"2026-05-20"},
  {id:"d004",title:"低温等离子体灭菌设备小型化",status:"open",matches:2,created:"2026-06-03"},
  {id:"d010",title:"高精度光纤陀螺仪微型化",status:"open",matches:0,created:"2026-06-05"},
];
function render(){document.getElementById("demandTable").innerHTML='<tr><th>选择</th><th>需求</th><th>状态</th><th>匹配数</th><th>创建时间</th></tr>'+demands.map(d=>`<tr><td><input type="checkbox" value="${d.id}" onchange="updateSelectAll()"></td><td>${d.title}</td><td><span class="badge ${d.status==='open'?'b-open':'b-match'}">${d.status==='open'?'开放':d.status==='matching'?'匹配中':'解决中'}</span></td><td>${d.matches}</td><td>${d.created}</td></tr>`).join('')}
function toggleAll(){const c=document.getElementById("selectAll").checked;document.querySelectorAll("#demandTable input[type=checkbox][value]").forEach(b=>b.checked=c)}
function updateSelectAll(){const all=document.querySelectorAll("#demandTable input[type=checkbox][value]");document.getElementById("selectAll").checked=all.length&&[...all].every(b=>b.checked)}
function getSelected(){return [...document.querySelectorAll("#demandTable input[type=checkbox][value]:checked")].map(b=>b.value)}
function doBatch(){const ids=getSelected();const act=document.getElementById("batchAction").value;if(!ids.length)return showMsg("请选择至少一条需求");if(!act)return showMsg("请选择操作");const selected=demands.filter(d=>ids.includes(d.id));if(act==="close")selected.forEach(d=>d.status="closed");if(act==="pause")selected.forEach(d=>{if(d.status==="open")d.status="matching"});
  render();showMsg(`已${act==="close"?"关闭":act==="pause"?"暂停":"恢复"} ${ids.length} 条需求`,"ok")}
function exportData(fmt){const ids=getSelected();const data=(ids.length?demands.filter(d=>ids.includes(d.id)):demands).map(d=>({需求ID:d.id,标题:d.title,状态:d.status,匹配数:d.matches,创建时间:d.created}));
  let out=fmt==="json"?JSON.stringify(data,null,2):"需求ID,标题,状态,匹配数,创建时间\n"+data.map(r=>Object.values(r).join(",")).join("\n");
  document.getElementById("exportPreview").textContent=out;
  const b=new Blob([out],{type:fmt==="json"?"application/json":"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`demand_chain_export.${fmt}`;a.click();showMsg(`已导出 ${data.length} 条记录为 .${fmt}`,"ok")}
function showMsg(t,c){const m=document.getElementById("batchMsg");m.innerHTML=`<div class="msg msg-${c||'ok'}">${t}</div>`;setTimeout(()=>m.innerHTML="",3000)}
render()
</script>
