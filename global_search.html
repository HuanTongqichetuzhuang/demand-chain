<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全局搜索 | Global Search</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
  :root {--purple:#7c6ef0;--muted:#8888aa;
    --bg: #0c0c1d; --card-bg: #14142b; --text: #e8e8f0;
    --text-secondary: #9090b0; --accent: #6c5ce7; --border: #2a2a4a;
    --green: #00b894; --amber: #fdcb6e; --red: #e24b4a;
  }
  * { margin:0;padding:0;box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }

  .search-hero { text-align: center; padding: 60px 20px 30px; }
  .search-hero h1 { font-size: 2em; margin-bottom: 16px; }
  .search-box { display: flex; gap: 8px; max-width: 600px; margin: 0 auto; }
  .search-box input { flex:1; padding: 14px 18px; border-radius: 12px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 1.1em; }
  .search-box input:focus { border-color: var(--accent); outline: none; }
  .search-box button { padding: 14px 24px; border-radius: 12px; background: var(--accent); color: #fff; border: none; font-size: 1em; font-weight: 600; cursor: pointer; }
  .search-box button:hover { background: #7c6ef0; }
  .search-meta { color: var(--text-secondary); font-size: 0.85em; margin-top: 10px; }

  .filter-row { display: flex; gap: 8px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
  .f-btn { padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 0.85em; cursor: pointer; }
  .f-btn.active { border-color: var(--accent); color: #a29bfe; background: rgba(108,92,231,0.08); }

  .results-section { margin: 30px 0; }
  .results-section h3 { font-size: 1.1em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .results-section h3 .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: 600; }
  .badge-demand { background: rgba(108,92,231,0.15); color: #a29bfe; }
  .badge-capability { background: rgba(0,184,148,0.15); color: var(--green); }
  .badge-forum { background: rgba(253,203,110,0.15); color: var(--amber); }
  .badge-supplier { background: rgba(226,75,74,0.15); color: var(--red); }

  .result-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .result-card:hover { border-color: var(--accent); }
  .result-card .r-title { font-size: 1em; font-weight: 600; margin-bottom: 4px; }
  .result-card .r-body { font-size: 0.85em; color: var(--text-secondary); }
  .result-card .r-meta { font-size: 0.75em; color: var(--text-secondary); margin-top: 6px; display: flex; gap: 10px; }
  .result-card .r-type { padding: 1px 6px; border-radius: 4px; font-size: 0.7em; }
  .type-demand { background: rgba(108,92,231,0.1); color: #a29bfe; }
  .type-capability { background: rgba(0,184,148,0.1); color: var(--green); }
  .type-forum { background: rgba(253,203,110,0.1); color: var(--amber); }
  .type-supplier { background: rgba(226,75,74,0.1); color: var(--red); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .highlight { background: rgba(253,203,110,0.2); padding: 0 2px; border-radius: 2px; }

@media(max-width:768px){
  nav{flex-direction:column;gap:10px;padding:12px}
  nav .links{flex-wrap:wrap;justify-content:center}
  .hero{padding:40px 16px 30px}
  .hero h1{font-size:28px}
  .stats{gap:16px;flex-wrap:wrap}
  .stats .stat .number{font-size:24px}
  .features,.agents-grid{grid-template-columns:1fr}
  .section{padding:30px 16px}
}

nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1100px;margin:0 auto;border-bottom:1px solid var(--border)}
nav .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px;color:var(--text);text-decoration:none}
nav .brand:hover{text-decoration:none}
nav .brand img{width:36px;height:36px;border-radius:8px}
nav .links{display:flex;gap:20px;align-items:center}
nav .links a{font-size:14px;color:var(--muted);transition:color .15s}
nav .links a:hover{color:var(--text);text-decoration:none}
nav .links .btn-nav{background:var(--purple);color:#fff;padding:7px 18px;border-radius:8px;font-size:14px;font-weight:500;transition:background .15s}
nav .links .btn-nav:hover{background:#8c7ef5;text-decoration:none;color:#fff}
footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}
footer .links{margin-bottom:12px;display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
footer .links a{color:var(--muted);font-size:13px}
footer .links a:hover{color:var(--text)}

</style>

<meta property="og:title" content="需求链平台 — AI 驱动创新基础设施">
<meta property="og:description" content="用 AI 助手自动匹配需求与供应商。注册即用，永久开源。">

</head>
<body>
<nav>
  <a class="brand" href="/">
    <img src="logo_small.png" alt="" loading="lazy">
    需求链平台
  </a>

  </div>
</nav>

<div class="container">
  <div class="search-hero">
    <h1>全局搜索</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索需求、能力画像、论坛帖子、供应商..." onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">搜索</button>
    </div>
    <p class="search-meta" id="searchMeta"></p>
  </div>

  <div class="filter-row">
    <span class="f-btn active" onclick="toggleFilter(this,'all')">全部</span>
    <span class="f-btn active" onclick="toggleFilter(this,'demand')">需求</span>
    <span class="f-btn active" onclick="toggleFilter(this,'capability')">能力画像</span>
    <span class="f-btn active" onclick="toggleFilter(this,'forum')">论坛</span>
    <span class="f-btn active" onclick="toggleFilter(this,'supplier')">供应商</span>
  </div>

  <div id="results"></div>
</div>

<script>
let activeFilters = { all: true, demand: true, capability: true, forum: true, supplier: true };
let currentQuery = "";

function toggleFilter(btn, type) {
  if (type === "all") {
    const makeAll = !activeFilters.all;
    ["all","demand","capability","forum","supplier"].forEach(t => activeFilters[t]=makeAll);
    document.querySelectorAll(".f-btn").forEach(b=>b.classList.toggle("active",makeAll));
  } else {
    activeFilters[type] = !activeFilters[type];
    btn.classList.toggle("active",activeFilters[type]);
    activeFilters.all = activeFilters.demand && activeFilters.capability && activeFilters.forum && activeFilters.supplier;
    document.querySelector(".f-btn").classList.toggle("active",activeFilters.all);
  }
  if (currentQuery) doSearch();
}

function doSearch() {
  const q = document.getElementById("searchInput").value.trim();
  const resultsDiv = document.getElementById("results");
  const meta = document.getElementById("searchMeta");

  if (!q) {
    resultsDiv.innerHTML = "";
    meta.textContent = "输入关键词搜索，支持中文、英文、IPC代码、学科名称";
    return;
  }

  currentQuery = q;
  meta.textContent = "搜索中...";
  resultsDiv.innerHTML = '<div class="empty"><h3>搜索中...</h3><p>正在跨表检索，请稍候</p></div>';

  fetch("/api/global_search?q=" + encodeURIComponent(q) + "&per_page=15")
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        resultsDiv.innerHTML = '<div class="empty"><h3>搜索出错</h3><p>' + data.error + '</p></div>';
        meta.textContent = "搜索出错";
        return;
      }

      let total = data.total || 0;
      const sections = [];

      if (activeFilters.demand && data.demands && data.demands.length) {
        sections.push({ type:"demand", label:"需求", badge:"badge-demand", hits: data.demands.map(d => ({
          id: d.id, title: d.raw_text || d.category || "", body: d.raw_text || "",
          category: d.category, status: d.status, _type: "demand"
        })), total: data.demands.length });
      }

      if (activeFilters.capability && data.suppliers && data.suppliers.length) {
        sections.push({ type:"capability", label:"能力画像", badge:"badge-capability", hits: data.suppliers.map(s => ({
          id: s.id, name: s.name || "", body: s.description || "",
          profile_type: s.profile_type, country: s.country, _type: "capability"
        })), total: data.suppliers.length });
      }

      if (activeFilters.forum && data.forum_topics && data.forum_topics.length) {
        sections.push({ type:"forum", label:"论坛帖子", badge:"badge-forum", hits: data.forum_topics.map(t => ({
          id: t.id, title: t.title || "", body: t.body || "",
          category: t.category, _type: "forum"
        })), total: data.forum_topics.length });
      }

      meta.textContent = total > 0 ? `找到 ${total} 条结果` : "未找到结果";

      if (total === 0) {
        resultsDiv.innerHTML = '<div class="empty"><h3>未找到结果</h3><p>试一下其他关键词，或用IPC代码如 G01、G06 搜索</p></div>';
        return;
      }

      const typeMap = { demand:"type-demand", capability:"type-capability", forum:"type-forum" };
      const labelMap = { demand:"需求", capability:"能力", forum:"论坛" };

      resultsDiv.innerHTML = sections.map(s => `
        <div class="results-section">
          <h3><span class="badge ${s.badge}">${s.label}</span> ${s.total} 条</h3>
          ${s.hits.map(h => {
            const titleText = h.title || h.name || "";
            const bodyText = h.body || "";
            return '<div class="result-card">' +
              '<div class="r-title">' + highlight(titleText.slice(0,120), q) + ' <span class="r-type ' + typeMap[s.type] + '">' + labelMap[s.type] + '</span></div>' +
              '<div class="r-body">' + highlight(bodyText.slice(0,200), q) + '</div>' +
              '<div class="r-meta">' +
                (h.category ? '<span>分类: ' + h.category + '</span>' : '') +
                (h.status ? '<span>状态: ' + h.status + '</span>' : '') +
                (h.country ? '<span>国家: ' + h.country + '</span>' : '') +
                (h.profile_type ? '<span>类型: ' + h.profile_type + '</span>' : '') +
              '</div></div>';
          }).join('')}
        </div>
      `).join('');
    })
    .catch(err => {
      resultsDiv.innerHTML = '<div class="empty"><h3>搜索请求失败</h3><p>' + err.message + '</p></div>';
      meta.textContent = "请求失败";
    });
}

function highlight(text, q) {
  if (!q || !text) return text||"";
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi');
  return text.replace(re, '<span class="highlight">$1</span>');
}

// Init
document.getElementById("searchMeta").textContent = "输入关键词搜索，支持中文、英文、IPC代码、学科名称";
</script>
