<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 920" width="100%" role="img">
  <title>需求链平台完整运行流程</title>
  <desc>从人表达需求到匹配解决的全链路流程图，含需求方、平台核心、供给方、供应商发现四条轨道</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: var(--font-sans, system-ui, sans-serif); }
    .th { font-size: 12px; font-weight: 500; }
    .tb { font-size: 11px; font-weight: 400; }
    .tl { font-size: 13px; font-weight: 500; }
    .ts { font-size: 10px; font-weight: 400; }
  </style>

  <!-- Region backgrounds -->
  <rect x="36" y="40" width="196" height="380" rx="14" fill="#042C53" stroke="#378ADD" stroke-width="0.5" opacity="0.4"/>
  <text class="tl" x="134" y="62" text-anchor="middle" fill="#85B7EB">需求方</text>

  <rect x="246" y="40" width="188" height="380" rx="14" fill="#0C447C" stroke="#378ADD" stroke-width="0.5" opacity="0.4"/>
  <text class="tl" x="340" y="62" text-anchor="middle" fill="#B5D4F4">平台核心</text>

  <rect x="448" y="40" width="196" height="380" rx="14" fill="#085041" stroke="#5DCAA5" stroke-width="0.5" opacity="0.4"/>
  <text class="tl" x="546" y="62" text-anchor="middle" fill="#9FE1CB">供给方</text>

  <rect x="36" y="436" width="608" height="230" rx="14" fill="#633806" stroke="#EF9F27" stroke-width="0.5" opacity="0.25"/>
  <text class="tl" x="340" y="458" text-anchor="middle" fill="#FAC775">供应商发现引擎（后台定时任务）</text>

  <rect x="36" y="682" width="608" height="218" rx="14" fill="#26215C" stroke="#AFA9EC" stroke-width="0.5" opacity="0.25"/>
  <text class="tl" x="340" y="704" text-anchor="middle" fill="#CECBF6">需求链延伸（循环）</text>

  <!-- === COLUMN 1: 需求方 === -->

  <!-- Human A -->
  <g>
    <rect x="56" y="84" width="156" height="44" rx="8" fill="#0C447C" stroke="#378ADD" stroke-width="0.5"/>
    <circle cx="76" cy="106" r="10" fill="#378ADD" opacity="0.3"/>
    <text class="th" x="134" y="110" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">人（需求方）表达需求</text>
  </g>

  <line x1="134" y1="128" x2="134" y2="155" stroke="#378ADD" stroke-width="1" marker-end="url(#a)"/>

  <!-- Agent A -->
  <g>
    <rect x="56" y="160" width="156" height="44" rx="8" fill="#0C447C" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="134" y="186" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">个人 AI Agent 接收</text>
  </g>

  <line x1="212" y1="182" x2="258" y2="182" stroke="#378ADD" stroke-width="1" marker-end="url(#a)"/>
  <text class="ts" x="235" y="175" text-anchor="middle" fill="#85B7EB">MCP</text>

  <!-- === COLUMN 2: 平台核心 === -->

  <!-- MCP Server -->
  <g>
    <rect x="266" y="84" width="148" height="44" rx="8" fill="#185FA5" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="340" y="103" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">MCP Server</text>
    <text class="ts" x="340" y="118" text-anchor="middle" fill="#85B7EB">publish_demand</text>
  </g>

  <line x1="340" y1="128" x2="340" y2="155" stroke="#378ADD" stroke-width="1" marker-end="url(#a)"/>

  <!-- LLM -->
  <g>
    <rect x="266" y="160" width="148" height="44" rx="8" fill="#185FA5" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="340" y="179" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">LLM 结构化</text>
    <text class="ts" x="340" y="194" text-anchor="middle" fill="#85B7EB">分类+打标签+摘要</text>
  </g>

  <line x1="340" y1="204" x2="340" y2="231" stroke="#378ADD" stroke-width="1" marker-end="url(#a)"/>

  <!-- Demand DB -->
  <g>
    <rect x="266" y="236" width="148" height="56" rx="8" fill="#042C53" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="340" y="256" text-anchor="middle" dominant-baseline="central" fill="#85B7EB">需求库</text>
    <text class="ts" x="340" y="274" text-anchor="middle" fill="#378ADD">PostgreSQL+pgvector</text>
  </g>

  <line x1="340" y1="292" x2="340" y2="319" stroke="#378ADD" stroke-width="1" marker-end="url(#a)"/>

  <!-- Worker + Matching -->
  <g>
    <rect x="266" y="324" width="148" height="56" rx="8" fill="#185FA5" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="340" y="344" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">匹配引擎</text>
    <text class="ts" x="340" y="362" text-anchor="middle" fill="#85B7EB">语义相似度  Top-K</text>
  </g>

  <line x1="414" y1="352" x2="460" y2="352" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a)"/>
  <text class="ts" x="437" y="345" text-anchor="middle" fill="#5DCAA5">推送</text>

  <!-- === COLUMN 3: 供给方 === -->

  <!-- Agent B -->
  <g>
    <rect x="468" y="236" width="156" height="44" rx="8" fill="#0F6E56" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="th" x="546" y="262" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">供给方 AI Agent 接收</text>
  </g>

  <line x1="546" y1="280" x2="546" y2="307" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a)"/>

  <!-- Human B -->
  <g>
    <rect x="468" y="312" width="156" height="44" rx="8" fill="#0F6E56" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="th" x="546" y="338" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">人（供给方）决策</text>
  </g>

  <!-- Decision fork -->
  <line x1="546" y1="356" x2="546" y2="383" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a)"/>

  <!-- Accept -->
  <g>
    <rect x="468" y="388" width="75" height="24" rx="6" fill="#27500A" stroke="#97C459" stroke-width="0.5"/>
    <text class="ts" x="505" y="404" text-anchor="middle" dominant-baseline="central" fill="#C0DD97">接受</text>
  </g>

  <!-- Extend -->
  <g>
    <rect x="549" y="388" width="75" height="24" rx="6" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="ts" x="586" y="404" text-anchor="middle" dominant-baseline="central" fill="#FAC775">延伸</text>
  </g>

  <line x1="586" y1="412" x2="586" y2="450" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"/>

  <!-- === SUPPLIER DISCOVERY === -->

  <!-- Data sources -->
  <g>
    <rect x="56" y="480" width="140" height="36" rx="6" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="126" y="502" text-anchor="middle" dominant-baseline="central" fill="#FAC775">专利数据库</text>
  </g>
  <g>
    <rect x="210" y="480" width="140" height="36" rx="6" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="280" y="502" text-anchor="middle" dominant-baseline="central" fill="#FAC775">政府采购公告</text>
  </g>
  <g>
    <rect x="364" y="480" width="140" height="36" rx="6" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="434" y="502" text-anchor="middle" dominant-baseline="central" fill="#FAC775">学术论文库</text>
  </g>
  <g>
    <rect x="518" y="480" width="106" height="36" rx="6" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="571" y="502" text-anchor="middle" dominant-baseline="central" fill="#FAC775">企业官网</text>
  </g>

  <line x1="340" y1="516" x2="340" y2="541" stroke="#EF9F27" stroke-width="1" marker-end="url(#a)"/>

  <!-- Crawler -->
  <g>
    <rect x="190" y="546" width="300" height="36" rx="6" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="340" y="568" text-anchor="middle" dominant-baseline="central" fill="#FAC775">Crawl4AI 爬取 + LLM 结构化 + 去重</text>
  </g>

  <line x1="340" y1="582" x2="340" y2="607" stroke="#EF9F27" stroke-width="1" marker-end="url(#a)"/>

  <!-- Unclaimed DB -->
  <g>
    <rect x="220" y="612" width="240" height="36" rx="6" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="340" y="634" text-anchor="middle" dominant-baseline="central" fill="#FAC775">unclaimed_suppliers 表</text>
  </g>

  <!-- Line from unclaimed to matching -->
  <line x1="460" y1="630" x2="628" y2="352" stroke="#EF9F27" stroke-width="0.8" stroke-dasharray="5,4"/>
  <text class="ts" x="570" y="488" fill="#EF9F27">匹配时作为候选</text>

  <!-- === DEMAND CHAIN LOOP === -->

  <line x1="586" y1="450" x2="340" y2="726" stroke="#EF9F27" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#a)"/>

  <!-- Sub-demand -->
  <g>
    <rect x="170" y="730" width="340" height="44" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="th" x="340" y="746" text-anchor="middle" dominant-baseline="central" fill="#CECBF6">子需求生成：需求拆分 → 发布到需求库</text>
    <text class="ts" x="340" y="762" text-anchor="middle" fill="#AFA9EC">extend_demand → 新需求回到匹配引擎</text>
  </g>

  <line x1="340" y1="774" x2="340" y2="800" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a)"/>

  <!-- Loop back -->
  <g>
    <rect x="200" y="804" width="280" height="36" rx="6" fill="#26215C" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="th" x="340" y="815" text-anchor="middle" dominant-baseline="central" fill="#CECBF6">循环：直到需求被解决或标记为无法解决</text>
    <text class="ts" x="340" y="831" text-anchor="middle" fill="#AFA9EC">get_demand_chain 追踪完整链路</text>
  </g>

  <!-- Back to top arrow -->
  <path d="M340 840 Q340 870 60 870 Q40 870 40 846 L40 106" fill="none" stroke="#AFA9EC" stroke-width="0.8" stroke-dasharray="4,4" marker-end="url(#a)"/>
  <text class="ts" x="180" y="882" text-anchor="middle" fill="#AFA9EC">子需求重新进入匹配循环</text>

</svg>
