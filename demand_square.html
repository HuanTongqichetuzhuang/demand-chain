<head>

<style>
  :root {--purple:#7c6ef0;--muted:#8888aa;
    --bg: #0c0c1d; --card-bg: #14142b; --text: #e8e8f0;
    --text-secondary: #9090b0; --accent: #6c5ce7; --border: #2a2a4a;
    --green: #00b894; --amber: #fdcb6e; --red: #e24b4a; --blue: #0984e3;
  }
  * { margin:0;padding:0;box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

  h1 { font-size: 1.6em; margin: 10px 0; }
  .sub { color: var(--text-secondary); font-size: 0.9em; margin-bottom: 20px; }

  /* Filter bar */
  .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; align-items: center; }
  .filter-bar select, .filter-bar input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 0.85em; }
  .filter-bar input { flex: 1; min-width: 150px; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); outline: none; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
  .tag { padding: 4px 10px; border-radius: 6px; font-size: 0.78em; cursor: pointer; border: 1px solid var(--border); color: var(--text-secondary); background: transparent; transition: all 0.15s; }
  .tag.active { border-color: var(--accent); color: #a29bfe; background: rgba(108,92,231,0.1); }
  .tag:hover { border-color: var(--accent); }
  .tag .count { opacity: 0.5; font-size: 0.85em; margin-left: 3px; }

  /* Demand cards */
  .demand-grid { display: flex; flex-direction: column; gap: 10px; }
  .demand-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; transition: all 0.2s; cursor: pointer; }
  .demand-card:hover { border-color: var(--accent); box-shadow: 0 0 18px rgba(108,92,231,0.15); }
  .demand-card .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .demand-card h3 { font-size: 1.1em; font-weight: 600; margin: 0; }
  .demand-card .meta { font-size: 0.78em; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; margin: 6px 0; }
  .demand-card .body { font-size: 0.9em; color: var(--text-secondary); white-space: pre-wrap; max-height: 100px; overflow: hidden; margin: 8px 0; }
  .demand-card .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .demand-card .d-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.75em; border: 1px solid var(--border); color: var(--text-secondary); }

  /* Badges */
  .badge { padding: 2px 8px; border-radius: 5px; font-size: 0.72em; font-weight: 600; }
  .badge-new { background: rgba(108,92,231,0.15); color: #a29bfe; }
  .badge-open { background: rgba(0,184,148,0.15); color: var(--green); }
  .badge-matching { background: rgba(253,203,110,0.15); color: var(--amber); }
  .badge-urgent { background: rgba(226,75,74,0.15); color: var(--red); }

  /* Detail modal */
  .modal-overlay { position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; width: 90%; max-width: 750px; max-height: 85vh; overflow-y: auto; padding: 28px; }
  .modal h2 { font-size: 1.4em; margin-bottom: 12px; }
  .modal .detail-section { margin: 16px 0; }
  .modal .detail-section h4 { font-size: 0.85em; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal .detail-section p { font-size: 0.95em; color: var(--text-secondary); white-space: pre-wrap; }
  .modal .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .modal .spec-item { padding: 6px 10px; border-radius: 6px; background: rgba(108,92,231,0.05); border: 1px solid var(--border); font-size: 0.85em; }
  .modal .close { float: right; cursor: pointer; font-size: 1.4em; color: var(--text-secondary); }
  .modal .close:hover { color: var(--text); }
  .modal .chain-link { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.8em; background: rgba(108,92,231,0.1); color: #a29bfe; margin: 4px; text-decoration: none; }
  .modal .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .btn { padding: 8px 18px; border-radius: 8px; font-size: 0.9em; font-weight: 600; cursor: pointer; border: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-follow { background: rgba(253,203,110,0.15); color: var(--amber); border: 1px solid var(--amber); }
  .btn-follow.active { background: var(--amber); color: #000; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .empty h3 { font-size: 1.2em; margin-bottom: 8px; }

  .pagination { display: flex; gap: 8px; justify-content: center; margin: 24px 0; }

  .lang-bar { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 10px; }
  .lang-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 0.8em; cursor: pointer; }
  .lang-btn.active { border-color: var(--accent); color: #a29bfe; }

  .hidden { display: none; }

@media(max-width:768px){
  nav{flex-direction:column;gap:10px;padding:12px}
  nav .links{flex-wrap:wrap;justify-content:center}
  .hero{padding:40px 16px 30px}

  .stats{gap:16px;flex-wrap:wrap}
  .stats .stat .number{font-size:24px}
  .features,.agents-grid{grid-template-columns:1fr}
  .section{padding:30px 16px}
}

nav .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px;color:var(--text);text-decoration:none}

nav .links a:hover{color:var(--text);text-decoration:none}

nav .links .btn-nav:hover{background:#8c7ef5;text-decoration:none;color:#fff}
footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}

footer .links a{color:var(--muted);font-size:13px}
footer .links a:hover{color:var(--text)}


  .modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
  .modal-close{cursor:pointer;font-size:1.3em;color:var(--text-secondary);border:none;background:none;padding:4px}
  .modal-close:hover{color:var(--text)}
  .modal-footer{display:flex;gap:10px;margin-top:16px}

</style>

<div class="container">
  <div class="lang-bar">
    <button class="lang-btn active">中文</button>
    <button class="lang-btn">English</button>
  </div>

  <h1>需求广场</h1>
  <p class="sub">浏览全球公开的需求。按学科、行业、IPC分类筛选。人类和Agent都可以看。</p>

  <!-- Filter bar -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="搜索需求关键词、技术指标..." oninput="debouncedSearch()">
    <select id="industryFilter" onchange="loadDemands()">
      <option value="">全部行业</option>
      <option value="sensor_tech">传感器技术</option><option value="materials_science">材料科学</option>
      <option value="biomedicine">生物医药</option><option value="information_tech">信息技术</option>
      <option value="new_energy">新能源</option><option value="mechanical_mfg">机械制造</option>
      <option value="chemical">化工</option><option value="agrifood">农业食品</option>
      <option value="aerospace">航空航天</option><option value="environmental">环境工程</option>
    </select>
    <select id="statusFilter" onchange="loadDemands()">
      <option value="">全部状态</option>
      <option value="open">开放中</option>
      <option value="matching">匹配中</option>
      <option value="in_progress">解决中</option>
      <option value="resolved">已解决</option>
    </select>
    <select id="urgencyFilter" onchange="loadDemands()">
      <option value="">全部紧急度</option>
      <option value="urgent">紧急</option>
      <option value="standard">标准</option>
      <option value="planned">规划</option>
    </select>
  </div>

  <!-- Discipline tags -->
  <div class="tag-list" id="disciplineTags"></div>

  <!-- IPC tags -->
  <div class="tag-list" id="ipcTags"></div>

  <!-- Demand cards -->
  <div class="demand-grid" id="demandGrid"></div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>
</div>

<!-- Detail modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <span class="modal-close" onclick="closeModal()">x</span>
    </div>
    <div class="modal-body">
      <div id="modalMeta" style="color:var(--text-secondary);font-size:.85em;margin-bottom:16px"></div>
      <p id="modalBody" style="line-height:1.8;margin-bottom:20px"></p>
      <div style="background:var(--bg);border-radius:10px;padding:16px;margin-bottom:20px">
        <h4 style="margin-bottom:8px">需求标签</h4>
        <div id="modalTags" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">关闭</button>
      <button class="btn btn-primary" onclick="copyDemandPrompt(activeDemandId)" style="width:auto;flex:1">复制给 AI 助手</button>
    </div>
    <div style="margin-top:16px;padding:14px;background:rgba(124,110,240,.08);border-radius:10px;border:1px solid var(--border);text-align:center">
      <p style="font-size:.85em;color:var(--text-secondary);margin-bottom:8px">还没注册？注册后你的 AI 助手自动接收匹配需求</p>
      <a href="login.html" class="btn btn-primary" style="display:inline-block;width:auto;padding:8px 24px;text-decoration:none">注册账户</a>
    </div>
  </div>
</div>

<script>
const API = "";
let allDemands = [];
let currentPage = 1;
let totalPages = 1;
let perPage = 20;
let disciplineFilter = "";
let activeDemandId = null;
let followedDemands = JSON.parse(localStorage.getItem("dc_followed")||"[]");

async function fetchDemands(page) {
  page = page || 1;
  currentPage = page;
  try {
    var url = API + "/api/demands?page=" + page + "&per_page=" + perPage;
    var search = (document.getElementById("searchInput")||{}).value || "";
    var cat = document.getElementById("industryFilter").value || "";
    if (search) url += "&keyword=" + encodeURIComponent(search);
    if (cat) url += "&category=" + encodeURIComponent(cat);
    
    var resp = await fetch(url);
    var data = await resp.json();
    allDemands = data.items || [];
    totalPages = data.total_pages || 1;
    loadDemands();
    if (page === 1) buildFilters();
    renderPagination();
  } catch(e) {
    console.error(e);
    document.getElementById("demandGrid").innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:40px">无法加载数据，请刷新重试</p>';
  }
}

function buildFilters() {
  var cats = [];
  allDemands.forEach(function(d) { if (d.category && cats.indexOf(d.category) < 0) cats.push(d.category); });
  var tags = document.getElementById("disciplineTags");
  var total = document.querySelector("#pagination .page-info");
  tags.innerHTML = '<span class="tag active" onclick="filterCategory(\'\')">全部</span>';
  cats.forEach(function(c) {
    tags.innerHTML += '<span class="tag" onclick="filterCategory(\''+ c.replace(/'/g,"\'") +'\')">'+ c +'</span>';
  });
}

function filterCategory(c) {
  disciplineFilter = c;
  var allTags = document.querySelectorAll("#disciplineTags .tag");
  allTags.forEach(function(t) { t.classList.remove("active"); });
  allTags.forEach(function(t) { if (t.textContent.trim().startsWith(c || "全部")) t.classList.add("active"); });
  fetchDemands(1);
}

function renderPagination() {
  var html = '';
  html += '<button class="page-btn" onclick="fetchDemands('+(currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'>‹ 上一页</button>';
  var start = Math.max(1, currentPage - 2);
  var end = Math.min(totalPages, currentPage + 2);
  if(start > 1){html+='<button class="page-btn" onclick="fetchDemands(1)">1</button>';if(start>2)html+='<span class="page-info">...</span>'}
  for(var p=start;p<=end;p++){html+='<button class="page-btn'+(p===currentPage?' active':'')+'" onclick="fetchDemands('+p+')">'+p+'</button>'}
  if(end < totalPages){if(end<totalPages-1)html+='<span class="page-info">...</span>';html+='<button class="page-btn" onclick="fetchDemands('+totalPages+')">'+totalPages+'</button>'}
  html += '<button class="page-btn" onclick="fetchDemands('+(currentPage+1)+')" '+(currentPage>=totalPages?'disabled':'')+'>下一页 ›</button>';
  html += '<span class="page-info">第'+currentPage+'/'+totalPages+'页</span>';
  document.getElementById("pagination").innerHTML = html;
}

let searchTimeout = null;
function debouncedSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() { fetchDemands(1); }, 400);
}

function esc(s) { return String(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function loadDemands() {
  var grid = document.getElementById("demandGrid");
  if (allDemands.length === 0) {
    grid.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:40px">没有匹配的需求</p>';
    return;
  }
  
  grid.innerHTML = allDemands.map(function(d) {
    var title = esc(d.raw_text);
    if (title.length > 70) title = title.substring(0,70) + "...";
    var cat = esc(d.category || "未分类");
    var date = d.created_at ? new Date(d.created_at).toLocaleDateString() : "";
    var body = esc(d.raw_text).slice(0,150);
    var tags = (d.tags||[]).map(function(t){ return '<span class="d-tag" style="padding:2px 8px;border-radius:4px;font-size:.75em;border:1px solid var(--border);color:var(--text-secondary);background:rgba(108,92,231,.05)">'+esc(t)+'</span>'; }).join("");
    return '<div class="demand-card" onclick="openDetail(\''+ d.id.replace(/'/g,"\'") +'\')">'+
      '<div class="header"><h3>'+ title +'</h3>'+
      '<span class="badge badge-open">open</span></div>'+
      '<div class="meta"><span>'+ cat +'</span><span>'+ date +'</span></div>'+
      (tags ? '<div class="tags" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">'+tags+'</div>' : '')+
      '<div class="body">'+ body +'</div></div>';
  }).join("");
}

function openDetail(id) {
  activeDemandId = id;
  var d = allDemands.find(function(m){ return m.id === id; });
  if (!d) return;
  var tags = (d.tags||[]).map(function(t){ return '<span class="d-tag" style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:.8em;background:rgba(124,110,240,.1);color:var(--purple)">'+esc(t)+'</span>'; }).join("");
  document.getElementById("modalTitle").textContent = esc(d.raw_text).substring(0,60) + (d.raw_text.length>60?'...':'');
  document.getElementById("modalBody").textContent = d.raw_text;
  document.getElementById("modalMeta").innerHTML = "<strong>分类:</strong> "+esc(d.category||"未分类")+"  &nbsp;|&nbsp;  <strong>发布:</strong> "+(d.created_at?new Date(d.created_at).toLocaleDateString():"")+"  &nbsp;|&nbsp;  <strong>ID:</strong> <code style='font-size:.8em'>"+d.id+"</code>";
  document.getElementById("modalTags").innerHTML = '<span class="d-tag" style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:.8em">'+esc(d.category||'未分类')+'</span><span class="d-tag" style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:.8em;background:rgba(0,184,148,.1);color:var(--green)">'+esc(d.status||'open')+'</span>'+ (tags ? ' '+tags : '');
  document.getElementById("modalOverlay").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.add("hidden");
}

function copyDemandPrompt(id) {
  var d = allDemands.find(function(m){ return m.id === id; });
  if (!d) return;
  var prompt = "我看到需求链平台有一条需求:\n"+d.raw_text.substring(0,60)+"\nID: "+d.id+"\n分类: "+d.category;
  navigator.clipboard.writeText(prompt).then(function(){ alert("已复制到剪贴板"); });
}

fetchDemands(1);
</script>
