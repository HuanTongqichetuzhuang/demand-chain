services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: demand_chain
      POSTGRES_USER: dc
      POSTGRES_PASSWORD: dc_dev_2026
    ports:
      -  5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U dc -d demand_chain]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp:
    image: demand-chain:original
    container_name: dc-mcp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dc:dc_dev_2026@db:5432/demand_chain
      DEEPSEEK_API_KEY: sk-c32415bb5ae44cdc844f1b95f99e4544
      FIRECRAWL_API_KEY: fc-e97094049296412bb87cc3946d515649
      LOG_LEVEL: INFO
    ports:
      - 8000:8000

  web:
    image: demand-chain:original
    container_name: dc-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dc:dc_dev_2026@db:5432/demand_chain
    ports:
      - 8080:80
    command: [python, -m, src.web_server]

volumes:
  pgdata:
