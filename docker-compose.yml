# 需求链平台 — Docker Compose
# 使用方式：
#   开发：  docker compose up -d                        # 从源码构建
#   生产：  IMAGE_TAG=demand-chain:slim docker compose up -d  # 用预构建镜像
#
# 环境变量：
#   DEEPSEEK_API_KEY   必需，LLM 调用
#   REDIS_URL          可选，缓存加速（不设置则缓存静默降级）
#   ALERT_WEBHOOK_URL  可选，Worker 告警

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: demand_chain
      POSTGRES_USER: dc
      POSTGRES_PASSWORD: dc_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc -d demand_chain"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - with-redis  # 默认不启动，docker compose --profile with-redis up -d

  mcp:
    image: ${IMAGE_TAG:-demand-chain:local}
    build: .
    container_name: dc-mcp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dc:dc_dev_2026@db:5432/demand_chain
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?请设置 DEEPSEEK_API_KEY 环境变量}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      LOG_LEVEL: INFO
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "8000:8000"

  web:
    image: ${IMAGE_TAG:-demand-chain:local}
    build: .
    container_name: dc-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dc:dc_dev_2026@db:5432/demand_chain
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?请设置 DEEPSEEK_API_KEY 环境变量}
      LOG_LEVEL: INFO
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "8080:80"
    command: ["python", "-m", "src.web_server"]
    volumes:
      - avatar_data:/app/avatars

  worker:
    image: ${IMAGE_TAG:-demand-chain:local}
    build: .
    container_name: dc-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dc:dc_dev_2026@db:5432/demand_chain
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?请设置 DEEPSEEK_API_KEY 环境变量}
      LOG_LEVEL: INFO
      REDIS_URL: ${REDIS_URL:-}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    command: ["python", "-m", "src.worker"]
    profiles:
      - with-worker  # 默认不启动，docker compose --profile with-worker up -d

networks:
  default:

volumes:
  pgdata:
  avatar_data:
