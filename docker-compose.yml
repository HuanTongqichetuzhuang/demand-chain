services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dc-db
    environment:
      POSTGRES_DB: demand_chain
      POSTGRES_USER: dc
      POSTGRES_PASSWORD: dc_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc -d demand_chain"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp:
    build: .
    container_name: dc-mcp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://dc:dc_dev_2026@db:5432/demand_chain
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts

  worker:
    build: .
    container_name: dc-worker
    command: python -m src.worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://dc:dc_dev_2026@db:5432/demand_chain
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LOG_LEVEL: INFO
      WORKER_INTERVAL_SECONDS: 60
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,json; r=urllib.request.urlopen('http://localhost:8003/health'); b=r.read(); d=json.loads(b); exit(0 if d['status']=='ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build: .
    container_name: dc-web
    command: python -m src.web_server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://dc:dc_dev_2026@db:5432/demand_chain
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:80"
    volumes:
      - ./src:/app/src
      - avatar_data:/app/avatars

volumes:
  pgdata:
  avatar_data:
