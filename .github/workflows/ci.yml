name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: demand_chain
          POSTGRES_USER: dc
          POSTGRES_PASSWORD: dc_dev_2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U dc -d demand_chain
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint (ruff)
        run: |
          pip install ruff
          ruff check src/ tests/ --output-format=github || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://dc:dc_dev_2026@localhost:5432/demand_chain
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest tests/ -v --tb=short -x -q
