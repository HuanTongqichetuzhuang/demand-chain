name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.ECS_SSH_PORT || '2222' }} ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to ECS
        run: |
          ssh -p ${{ secrets.ECS_SSH_PORT || '2222' }} root@${{ secrets.ECS_HOST }} '
            set -e
            cd /opt/demand-chain
            git pull origin master
            docker build -t demand-chain:slim .
            docker compose -f docker-compose.prod.yml -p dc run --rm --entrypoint sh mcp -c "cd /app && alembic upgrade head"
            docker compose -f docker-compose.prod.yml -p dc up -d --force-recreate web mcp worker
            echo "=== DEPLOY DONE ==="
          '
