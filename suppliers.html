<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>供应商 - 需求链平台</title>
<link rel="icon" href="logo.jpg" type="image/jpeg">
<link rel="stylesheet" href="shared.css">
<style>
h1{font-size:1.6em;margin:20px 0 4px}
.sub{color:var(--ts);font-size:.9em;margin-bottom:20px}
.row{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
.supplier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-top:16px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color .2s;position:relative}
.card:hover{border-color:var(--purple)}
.card .name{font-weight:600;font-size:1em;margin-bottom:4px}
.card .type{font-size:.75em;color:var(--purple);padding:2px 8px;border-radius:4px;background:rgba(124,110,240,.1);display:inline-block}
.card .desc{color:var(--ts);font-size:.85em;margin:8px 0;line-height:1.6}
.card .tags{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.card .tag{padding:3px 8px;border-radius:4px;background:rgba(108,92,231,.06);border:1px solid var(--border);font-size:.78em;color:var(--ts)}
.card .meta{font-size:.8em;color:var(--ts);display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.card .meta .country{padding:2px 6px;border-radius:4px;background:rgba(0,184,148,.1);color:var(--green)}
.card .meta .trl{color:var(--amber)}
.card .url{display:block;margin-top:10px;font-size:.8em;color:var(--purple);word-break:break-all}
.card .check{position:absolute;top:16px;right:16px;font-size:.75em;color:var(--green);background:rgba(0,184,148,.1);padding:2px 8px;border-radius:4px}
@media(max-width:768px){.supplier-grid{grid-template-columns:1fr}}
</style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<body>
<nav>
  <a class="brand" href="/"><img src="logo.jpg" alt="">需求链平台</a>
  <div class="links" id="navLinks">
    <a href="demand_square.html">需求广场</a>
    <a href="suppliers.html" style="color:var(--purple);font-weight:600">供应商</a>
    <a href="forum.html">论坛</a>
    <a href="login.html" class="btn-nav">登录</a>

<div class="container">
<h1>供应商</h1>
<p class="sub">公开的供应商能力档案。AI助手通过匹配引擎自动为每条需求寻找最佳供应商。</p>

<div class="row">
  <input class="search-box" id="searchInput" placeholder="搜索供应商名称/描述/技术..." oninput="render()" style="max-width:350px">
</div>

<div class="category-bar" id="catBar">
  <span class="cat-btn active" onclick="filterCat('')">全部 <span class="count" id="totalCount">0</span></span>
</div>

<div class="supplier-grid" id="grid">
  <div class="skeleton-row"><div class="skeleton" style="height:60px"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div class="skeleton-row"><div class="skeleton" style="height:60px"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div class="skeleton-row"><div class="skeleton" style="height:60px"></div><div class="skeleton"></div><div class="skeleton"></div></div>
</div>
</div>
<script src="/nav.js"></script>
<script>
var allSuppliers = [];
var currentCat = "";

async function load() {
  var r = await fetch("/api/suppliers"); allSuppliers = await r.json();
  var cats = {};
  allSuppliers.forEach(function(s) { var c = s.category || "_x5176_他"; cats[c] = (cats[c] || 0) + 1; });
  var bar = document.getElementById("catBar");
  Object.keys(cats).sort(function(a,b){ return cats[b]-cats[a]; }).forEach(function(c) {
    bar.innerHTML += '<span class="cat-btn" onclick="filterCat(\''+c.replace(/'/g,"\\'")+'\')">'+c+' <span class="count">'+cats[c]+'</span></span>';
  });
  document.getElementById("totalCount").textContent = allSuppliers.length;
  render();
}

function filterCat(c) {
  currentCat = c;
  document.querySelectorAll("#catBar .cat-btn").forEach(function(b) {
    b.classList.toggle("active", b.textContent.trim().indexOf(c||"全部")===0);
  });
  render();
}

function esc(s) { return String(s||"").replace(/</g,"&lt;"); }

function render() {
  var q = (document.getElementById("searchInput").value || "").toLowerCase();
  var filtered = allSuppliers;
  if (currentCat) filtered = filtered.filter(function(s){ return s.category === currentCat; });
  if (q) filtered = filtered.filter(function(s){
    return (s.name||"").toLowerCase().indexOf(q)>=0 ||
           (s.description||"").toLowerCase().indexOf(q)>=0 ||
           (s.industry||"").toLowerCase().indexOf(q)>=0 ||
           (s.skills||[]).some(function(sk){ return sk.toLowerCase().indexOf(q)>=0; });
  });
  var typeLabel = {"COMPANY":"企业","RESEARCH":"研究机构","INDIVIDUAL":"个人","TEAM":"团队","GOVERNMENT":"政府"};
  var grid = document.getElementById("grid");
  grid.innerHTML = filtered.length === 0
    ? '<p style="color:var(--ts);text-align:center;padding:40px;grid-column:1/-1">没有匹配的供应商</p>'
    : filtered.map(function(s) {
        var skills = (s.skills||[]).map(function(t){ return '<span class="tag">'+esc(t)+'</span>'; }).join("");
        var trl = s.trl ? 'TRL '+s.trl : "";
        return '<div class="card">'+
          (s.verified ? '<span class="check">已验证</span>' : '')+
          '<span class="type">'+(typeLabel[s.profile_type]||s.profile_type)+'</span>'+
          '<div class="name">'+esc(s.name)+'</div>'+
          '<div class="desc">'+esc((s.description||"").substring(0,200))+'</div>'+
          '<div class="tags">'+skills+'</div>'+
          '<div class="meta"><span class="country">'+esc(s.country||"")+'</span><span>'+esc(s.industry||"")+'</span>'+(trl?'<span class="trl">'+trl+'</span>':'')+'</div>'+
          (s.url ? '<a href="'+esc(s.url)+'" target="_blank" class="url">'+esc(s.url)+'</a>' : '')+
        '</div>'; }).join("");
}

load();
</script>
</body>
</html>
