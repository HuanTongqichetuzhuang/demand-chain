<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天 | 需求链平台</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
  :root{--purple:#7c6ef0;--muted:#8888aa;--bg:#0c0c1d;--card:#14142b;--text:#e8e8f0;--ts:#9090b0;--ac:#6c5ce7;--br:#2a2a4a;--gn:#00b894;--am:#fdcb6e;--rd:#e24b4a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
  .chat-header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--br);flex-shrink:0}
  .chat-header .back{color:var(--ts);text-decoration:none;font-size:.9em;cursor:pointer}.chat-header .back:hover{color:var(--text)}
  .chat-header h2{font-size:1.05em;flex:1}
  .online-dot{width:8px;height:8px;border-radius:50%;background:var(--gn);margin-right:2px;display:inline-block}.online-dot.offline{background:var(--ts)}
  .chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:75%;padding:10px 14px;border-radius:14px;font-size:.92em;line-height:1.55;word-break:break-word}
  .msg.me{align-self:flex-end;background:var(--ac);color:#fff;border-bottom-right-radius:4px}
  .msg.other{align-self:flex-start;background:var(--card);border:1px solid var(--br);border-bottom-left-radius:4px}
  .msg.system{align-self:center;font-size:.8em;color:var(--ts);background:transparent;max-width:90%;text-align:center}
  .msg .time{font-size:.7em;opacity:.6;margin-top:4px;display:block}
  .chat-input{display:flex;gap:8px;padding:12px 20px;background:var(--card);border-top:1px solid var(--br);flex-shrink:0}
  .chat-input input{flex:1;padding:10px 16px;border-radius:20px;border:1px solid var(--br);background:var(--bg);color:var(--text);font-size:.9em}
  .chat-input input:focus{border-color:var(--ac);outline:none}
  .chat-input button{padding:10px 20px;border-radius:20px;background:var(--ac);color:#fff;border:none;font-weight:600;cursor:pointer;font-size:.9em}
  .chat-input button:hover{background:#7c6ef0}
  .empty{text-align:center;padding:40px;color:var(--ts)}
  .typing{font-size:.75em;color:var(--ts);padding:4px 16px;height:20px;flex-shrink:0}
  .conn-status{font-size:.75em;padding:2px 12px;border-radius:4px;margin-left:8px}
  .conn-status.ok{color:var(--gn)}.conn-status.err{color:var(--rd)}
  .conversations{width:280px;border-right:1px solid var(--br);overflow-y:auto;flex-shrink:0;display:none}
  .conversations .conv{padding:12px 16px;border-bottom:1px solid var(--br);cursor:pointer;font-size:.85em}
  .conversations .conv:hover,.conversations .conv.active{background:rgba(108,92,231,0.08)}
  .chat-layout{display:flex;flex:1;overflow:hidden}
  .chat-main{flex:1;display:flex;flex-direction:column}
  @media(max-width:600px){
    .msg{max-width:90%}
    .conversations{width:100%;max-height:200px;border-right:none;border-bottom:1px solid var(--br)}
    .chat-layout{flex-direction:column}
  }
</style>
</head>
<body>
<nav></nav>
<div class="chat-layout">
  <div class="conversations" id="convList"></div>
  <div class="chat-main">
    <div class="chat-header">
      <a class="back" onclick="history.back()">← 返回</a>
      <div><span class="online-dot" id="onlineDot"></span><span id="onlineText">离线</span></div>
      <h2 id="chatTitle">消息</h2>
      <span class="conn-status" id="connStatus">连接中...</span>
    </div>
    <div class="chat-msgs" id="messages">
      <div class="msg system">选择左侧对话开始聊天，或发送消息给对方。</div>
    </div>
    <div class="typing" id="typing"></div>
    <div class="chat-input">
      <input type="text" id="input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()" disabled>
      <button onclick="send()">发送</button>
    </div>
  </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem("dc_session") || "null");
let ws = null;
let wsConnected = false;
let activeConv = null; // { to_human_id, to_name, to_email }
let conversations = [];

// ── Connect WebSocket ──────────────────────────────────────
function connectWS() {
  if (!currentUser || !currentUser.email) {
    document.getElementById("connStatus").textContent = "未登录";
    document.getElementById("connStatus").className = "conn-status err";
    return;
  }

  const protocol = location.protocol === "https:" ? "wss:" : "ws:";
  const wsUrl = protocol + "//" + location.host + "/ws/chat";

  try {
    ws = new WebSocket(wsUrl);

    ws.onopen = function() {
      ws.send(JSON.stringify({ type: "auth", email: currentUser.email }));
    };

    ws.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.type === "auth_ok") {
          wsConnected = true;
          document.getElementById("connStatus").textContent = "已连接";
          document.getElementById("connStatus").className = "conn-status ok";
          document.getElementById("input").disabled = false;
          loadConversations();
        } else if (data.type === "message") {
          // Incoming real-time message
          addMessage({
            from: data.from,
            content: data.content,
            created_at: data.created_at || new Date().toISOString(),
          }, false);
          // Refresh conversations
          loadConversations();
        } else if (data.type === "pong") {
          // heartbeat ok
        }
      } catch(e) {}
    };

    ws.onclose = function() {
      wsConnected = false;
      document.getElementById("connStatus").textContent = "已断开";
      document.getElementById("connStatus").className = "conn-status err";
      document.getElementById("input").disabled = true;
      setTimeout(connectWS, 3000); // reconnect
    };

    ws.onerror = function() {
      document.getElementById("connStatus").textContent = "连接失败";
      document.getElementById("connStatus").className = "conn-status err";
    };
  } catch(e) {
    document.getElementById("connStatus").textContent = "连接异常";
  }
}

// ── Load conversations ─────────────────────────────────────
function loadConversations() {
  if (!currentUser || !currentUser.email) return;
  fetch("/api/messages?email=" + encodeURIComponent(currentUser.email))
    .then(r => r.json())
    .then(data => {
      if (!data.items || !data.items.length) {
        document.getElementById("convList").innerHTML =
          '<div class="empty" style="padding:20px;font-size:.85em">暂无对话</div>';
        return;
      }

      // Group by other party
      const convMap = {};
      data.items.forEach(function(m) {
        const otherId = m.from_user === currentUser.human_id ? m.to_user : m.from_user;
        if (!convMap[otherId]) {
          convMap[otherId] = { other_id: otherId, messages: [], last_time: "" };
        }
        convMap[otherId].messages.push(m);
        if (m.created_at > convMap[otherId].last_time) {
          convMap[otherId].last_time = m.created_at;
        }
      });

      const convs = Object.values(convMap);
      convs.sort(function(a, b) { return b.last_time.localeCompare(a.last_time); });
      conversations = convs;

      var html = convs.map(function(c) {
        const lastMsg = c.messages[c.messages.length - 1];
        const time = lastMsg && lastMsg.created_at ? new Date(lastMsg.created_at).toLocaleString("zh-CN", {hour:'2-digit',minute:'2-digit'}) : "";
        const text = lastMsg ? lastMsg.content.slice(0,50) : "";
        const isActive = activeConv && activeConv.to_human_id === c.other_id;
        return '<div class="conv' + (isActive ? ' active' : '') + '" onclick="openConv(\'' + c.other_id + '\')">' +
          '<div style="font-weight:600;font-size:.9em">用户 ' + c.other_id.slice(0,8) + '</div>' +
          '<div style="color:var(--ts);font-size:.8em;margin-top:2px">' + escHtml(text) + ' · ' + time + '</div></div>';
      }).join('');
      document.getElementById("convList").innerHTML = html;
      document.getElementById("convList").style.display = convs.length ? "block" : "none";
    })
    .catch(function() {});
}

// ── Open conversation ──────────────────────────────────────
function openConv(otherId) {
  activeConv = { to_human_id: otherId };
  document.getElementById("chatTitle").textContent = "用户 " + otherId.slice(0,8);
  document.getElementById("onlineText").textContent = "未知";

  // Load messages for this conversation
  if (!currentUser || !currentUser.email) return;
  fetch("/api/messages?email=" + encodeURIComponent(currentUser.email))
    .then(r => r.json())
    .then(data => {
      if (!data.items) return;
      const filtered = data.items.filter(function(m) {
        return (m.from_user === otherId || m.to_user === otherId);
      });
      renderMessages(filtered);
    })
    .catch(function() {});
  loadConversations();
}

// ── Render messages ────────────────────────────────────────
function renderMessages(msgs) {
  const el = document.getElementById("messages");
  if (!msgs || !msgs.length) {
    el.innerHTML = '<div class="msg system">开始对话吧！发送第一条消息。</div>';
    return;
  }
  el.innerHTML = msgs.map(function(m) {
    const isMe = m.from_user === (currentUser && currentUser.human_id);
    const time = m.created_at ? new Date(m.created_at).toLocaleString("zh-CN", {hour:'2-digit',minute:'2-digit'}) : "";
    return '<div class="msg ' + (isMe ? 'me' : 'other') + '">' +
      escHtml(m.content) + '<span class="time">' + time + '</span></div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function addMessage(data, isMe) {
  const el = document.getElementById("messages");
  const time = data.created_at ? new Date(data.created_at).toLocaleString("zh-CN", {hour:'2-digit',minute:'2-digit'}) : "";
  const div = document.createElement("div");
  div.className = "msg " + (isMe ? "me" : "other");
  div.innerHTML = escHtml(data.content) + '<span class="time">' + time + '</span>';
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// ── Send message ───────────────────────────────────────────
function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  if (wsConnected && ws && activeConv) {
    ws.send(JSON.stringify({
      type: "message",
      to: activeConv.to_human_id,
      content: text,
    }));
    // Optimistic render
    addMessage({ content: text, created_at: new Date().toISOString() }, true);
  } else if (activeConv) {
    // Fallback to REST API
    fetch("/api/messages/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: currentUser.email,
        to_human_id: activeConv.to_human_id,
        content: text,
      })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.status === "ok") {
        addMessage({ content: text, created_at: new Date().toISOString() }, true);
        loadConversations();
      }
    }).catch(function() {});
  } else {
    alert("请先选择一个对话");
    return;
  }

  input.value = "";
  document.getElementById("typing").textContent = "";
}

// ── Escaping ───────────────────────────────────────────────
function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Init ───────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", function() {
  if (!currentUser || !currentUser.email) {
    document.getElementById("chatTitle").textContent = "请先登录";
    document.getElementById("connStatus").textContent = "未登录";
    return;
  }
  connectWS();
});
</script>
<script src="/nav.js?v=6"></script>
</body>
</html>
