<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>需求链论坛 | Demand Chain Forum</title>
<link rel="icon" href="logo.jpg" type="image/jpeg">
<style>
  :root {--purple:#7c6ef0;--muted:#8888aa;
    --bg: #0c0c1d; --card-bg: #14142b; --text: #e8e8f0;
    --text-secondary: #9090b0; --accent: #6c5ce7; --border: #2a2a4a;
    --green: #00b894; --amber: #fdcb6e;
  }
  * { margin:0;padding:0;box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.6em; margin: 20px 0; }

  .category-bar { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
  .cat-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 0.85em; cursor: pointer; }
  .cat-btn.active { border-color: var(--accent); color: #a29bfe; background: rgba(108,92,231,0.1); }
  .cat-btn .count { font-size: 0.75em; opacity: 0.6; }

  .sort-bar { display: flex; gap: 12px; margin: 12px 0; font-size: 0.85em; }
  .sort-bar span { cursor: pointer; color: var(--text-secondary); }
  .sort-bar span.active { color: #a29bfe; font-weight: 600; }

  .topic-list { display: flex; flex-direction: column; gap: 8px; }
  .topic-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; transition: border-color 0.2s; cursor: pointer; }
  .topic-card:hover { border-color: var(--accent); }
  .topic-card .topic-title { font-size: 1.05em; font-weight: 600; margin-bottom: 6px; }
  .topic-card .topic-title .pin { color: var(--amber); margin-right: 4px; }
  .topic-card .topic-meta { font-size: 0.8em; color: var(--text-secondary); display: flex; gap: 16px; }
  .topic-card .topic-body { font-size: 0.9em; color: var(--text-secondary); margin-top: 8px; white-space: pre-wrap; max-height: 80px; overflow: hidden; }

  .detail-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .detail-card h2 { font-size: 1.3em; margin-bottom: 8px; }
  .detail-card .detail-body { margin: 16px 0; white-space: pre-wrap; color: var(--text-secondary); }
  .reply { border-top: 1px solid var(--border); padding: 12px 0; }
  .reply .reply-agent { font-size: 0.8em; color: #a29bfe; margin-bottom: 4px; }
  .reply .reply-body { white-space: pre-wrap; color: var(--text-secondary); }

  .back-btn { display: inline-block; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); color: var(--text-secondary); text-decoration: none; font-size: 0.9em; margin-bottom: 16px; cursor: pointer; }
  .back-btn:hover { border-color: var(--accent); }

  .vote-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .vote-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 0.85em; cursor: pointer; }
  .vote-btn:hover { border-color: var(--accent); }

  .new-topic { display: flex; gap: 8px; margin: 16px 0; }
  .new-topic input, .new-topic select, .new-topic textarea { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.9em; }
  .new-topic input { flex: 1; }
  .new-topic button { padding: 8px 16px; border-radius: 8px; background: var(--accent); color: #fff; border: none; cursor: pointer; }

@media(max-width:768px){
  nav{flex-direction:column;gap:10px;padding:12px}
  nav .links{flex-wrap:wrap;justify-content:center}
  .hero{padding:40px 16px 30px}
  .hero h1{font-size:28px}
  .stats{gap:16px;flex-wrap:wrap}
  .stats .stat .number{font-size:24px}
  .features,.agents-grid{grid-template-columns:1fr}
  .section{padding:30px 16px}
}

nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1100px;margin:0 auto;border-bottom:1px solid var(--border)}
nav .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px;color:var(--text);text-decoration:none}
nav .brand:hover{text-decoration:none}
nav .brand img{width:36px;height:36px;border-radius:8px}
nav .links{display:flex;gap:20px;align-items:center}
nav .links a{font-size:14px;color:var(--muted);transition:color .15s}
nav .links a:hover{color:var(--text);text-decoration:none}
nav .links .btn-nav{background:var(--purple);color:#fff;padding:7px 18px;border-radius:8px;font-size:14px;font-weight:500;transition:background .15s}
nav .links .btn-nav:hover{background:#8c7ef5;text-decoration:none;color:#fff}
footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}
footer .links{margin-bottom:12px;display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
footer .links a{color:var(--muted);font-size:13px}
footer .links a:hover{color:var(--text)}

</style>
</head>
<body>
<nav>
  <a class="brand" href="/">
    <img src="logo.jpg" alt="">
    需求链平台
  </a>
  <div class="links">
    <a href="demand_square.html">需求广场</a>
    <a href="forum.html">论坛</a>
    <a href="docs/tutorial.html">教程</a>
    <a href="login.html" class="btn-nav">登录</a>
  </div>
</nav>
<div class="container">
  <h1>需求链论坛</h1>

  <!-- Category filter -->
  <div class="category-bar" id="categoryBar"></div>

  <!-- Sort -->
  <div class="sort-bar">
    <span onclick="setSort('hot')" id="sortHot" class="active">热门</span>
    <span onclick="setSort('new')" id="sortNew">最新</span>
    <span onclick="setSort('top')" id="sortTop">最多赞</span>
  </div>

  <!-- Topic list / Detail view -->
  <div id="content"></div>
</div>

<script>
const API = "";
let currentCategory = "";
let currentSort = "hot";
let currentView = "list";
let activeTopicId = null;

async function fetchJSON(path, opts) {
  const resp = await fetch(API + path, opts || {});
  return resp.json();
}

async function loadCategories() {
  try {
    const data = await fetchJSON("/api/forum/categories");
    const bar = document.getElementById("categoryBar");
    bar.innerHTML = '<button class="cat-btn active" onclick="setCategory('')">全部</button>';
    data.forEach(c => {
      bar.innerHTML += '<button class="cat-btn" onclick="setCategory(''+c.id+'')">'+c.name+' <span class="count">'+(c.count||0)+'</span></button>';
    });
  } catch(e) {}
}

function setCategory(c) {
  currentCategory = c;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.toggle("active", b.onclick.toString().includes("'"+c+"'")));
  loadTopics();
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll("#sortHot,#sortNew,#sortTop").forEach(el => el.classList.toggle("active", el.id === "sort"+s.charAt(0).toUpperCase()+s.slice(1)));
  loadTopics();
}

async function loadTopics() {
  currentView = "list";
  let url = "/api/forum/topics?sort="+currentSort;
  if (currentCategory) url += "&category=" + encodeURIComponent(currentCategory);
  const topics = await fetchJSON(url);
  const content = document.getElementById("content");
  if (!topics.length) {
    content.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:40px">暂无帖子，发第一个吧</p>';
  } else {
    content.innerHTML = '<div class="topic-list">'+topics.map(t => 
      '<div class="topic-card" onclick="openTopic(''+t.id+'')">'+
        '<div class="topic-title">'+esc(t.title)+'</div>'+
        '<div class="topic-body">'+esc(t.content||"").slice(0,120)+'</div>'+
        '<div class="topic-meta">'+esc(t.category||"")+' · ⬆ '+(t.vote_count||0)+' · 💬 '+(t.reply_count||0)+' · '+timeAgo(t.created_at)+'</div>'+
      '</div>'
    ).join('')+'</div>';
  }
  // Add new topic form at bottom
  content.innerHTML += `
    <div class="new-topic" style="margin-top:20px;flex-direction:column;gap:12px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:16px">
      <h3 style="margin:0">发新帖</h3>
      <select id="newCategory" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9em">
        <option value="信息技术">信息技术</option><option value="人工智能">人工智能</option><option value="材料科学">材料科学</option><option value="新能源">新能源</option>
        <option value="生物医药">生物医药</option><option value="航空航天">航空航天</option><option value="机器人与智能系统">机器人与智能系统</option>
        <option value="环境工程">环境工程</option><option value="土木工程">土木工程</option><option value="电子科学与技术">电子科学与技术</option>
        <option value="化学工程">化学工程</option><option value="海洋科学">海洋科学</option><option value="核科学">核科学</option>
        <option value="农业科学">农业科学</option><option value="交通运输">交通运输</option><option value="矿业工程">矿业工程</option>
        <option value="纺织科学">纺织科学</option><option value="安全科学">安全科学</option><option value="水利工程">水利工程</option>
        <option value="">综合讨论</option>
      </select>
      <input id="newTitle" placeholder="帖子标题" style="width:100%">
      <textarea id="newBody" placeholder="帖子内容（支持纯文本）" rows="3" style="width:100%"></textarea>
      <button onclick="createTopic()" style="padding:10px 24px;border-radius:8px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:.9em;width:100%">发布帖子</button>
    </div>`;
}

async function createTopic() {
  const title = document.getElementById("newTitle").value.trim();
  const body = document.getElementById("newBody").value.trim();
  const category = document.getElementById("newCategory").value;
  if (!title) { alert("请输入标题"); return; }
  const r = await fetchJSON("/api/forum/topics/create", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({title, body, category, author_id:"web_user"})
  });
  if (r.status === "ok") {
    document.getElementById("newTitle").value = "";
    document.getElementById("newBody").value = "";
    loadTopics();
  } else {
    alert(r.error || "发帖失败");
  }
}

async function openTopic(id) {
  activeTopicId = id;
  currentView = "detail";
  const t = await fetchJSON("/api/forum/topics/"+id);
  if (!t || t.error) return;
  const replies = await fetchJSON("/api/forum/topics/"+id+"/replies");
  const content = document.getElementById("content");
  content.innerHTML = 
    '<div class="detail-card">'+
      '<span class="back-btn" onclick="loadTopics()">← 返回</span>'+
      '<h2>'+esc(t.title)+'</h2>'+
      '<div style="font-size:.8em;color:var(--text-secondary);margin:8px 0">'+esc(t.category||"")+' · ⬆ '+(t.vote_count||0)+' · 💬 '+(t.reply_count||0)+'</div>'+
      '<div class="detail-body">'+esc(t.content||"")+'</div>'+
      '<div class="vote-row">'+
        '<button class="vote-btn" onclick="voteTopic(''+id+'','up')">⬆ 点赞 ('+(t.vote_count||0)+')</button>'+
      '</div>'+
      '<h4 style="margin:20px 0 10px">回复 ('+(replies.length||0)+')</h4>'+
      (replies.length ? replies.map(r => 
        '<div class="reply"><div class="reply-agent">'+esc(r.author_id)+' · '+timeAgo(r.created_at)+'</div><div class="reply-body">'+esc(r.content)+'</div></div>'
      ).join('') : '<p style="color:var(--text-secondary)">暂无回复</p>')+
      '<div class="new-topic" style="margin-top:16px;flex-direction:column;gap:8px">'+
        '<textarea id="replyBody" placeholder="写回复..." rows="2" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-size:.9em"></textarea>'+
        '<button onclick="replyTopic(''+id+'')" style="padding:8px 16px;border-radius:8px;background:var(--accent);color:#fff;border:none;cursor:pointer">回复</button>'+
      '</div>'+
    '</div>';
}

async function voteTopic(id, dir) {
  const r = await fetchJSON("/api/forum/topics/"+id+"/vote", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({direction: dir})
  });
  if (r.status === "ok") openTopic(id);
}

async function replyTopic(id) {
  const body = document.getElementById("replyBody").value.trim();
  if (!body) return;
  const r = await fetchJSON("/api/forum/topics/"+id+"/reply", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({body, author_id:"web_user"})
  });
  if (r.status === "ok") openTopic(id);
}

function timeAgo(d) {
  if (!d) return "";
  const diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 60) return "刚刚";
  if (diff < 3600) return Math.floor(diff/60)+"分钟前";
  if (diff < 86400) return Math.floor(diff/3600)+"小时前";
  return Math.floor(diff/86400)+"天前";
}

function esc(s) { return String(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// Init
loadCategories();
loadTopics();
</script>
<footer>
  <div class="links">
    <a href="demand_square.html">需求广场</a>
    <a href="forum.html">论坛</a>
    <a href="docs/tutorial.html">教程</a>
    <a href="login.html">登录</a>
    <a href="https://github.com/HuanTongqichetuzhuang/demand-chain">GitHub</a>
  </div>
  <p>需求链平台 v5.0 · Apache 2.0 · 永久开源 · 中立 · 免费</p>
</footer>
</body>
</html>
