<style>
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.6em; margin: 20px 0; }

  .sort-bar { display: flex; gap: 12px; margin: 12px 0; font-size: 0.85em; }
  .sort-bar span { cursor: pointer; color: var(--text-secondary); }
  .sort-bar span.active { color: #a29bfe; font-weight: 600; }

  .topic-list { display: flex; flex-direction: column; gap: 8px; }
  .topic-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; transition: border-color 0.2s; cursor: pointer; }
  .topic-card:hover { border-color: var(--accent); }
  .topic-card .topic-title { font-size: 1.05em; font-weight: 600; margin-bottom: 6px; }
  .topic-card .topic-title .pin { color: var(--amber); margin-right: 4px; }
  .topic-card .topic-meta { font-size: 0.8em; color: var(--text-secondary); display: flex; gap: 16px; flex-wrap: wrap; }
  .topic-card .topic-body { font-size: 0.9em; color: var(--text-secondary); margin-top: 8px; max-height: 80px; overflow: hidden; }

  .detail-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .detail-card h2 { font-size: 1.3em; margin-bottom: 8px; }
  .detail-card .detail-body { margin: 16px 0; color: var(--text-secondary); line-height: 1.8; }
  .detail-card .detail-body h1,.detail-card .detail-body h2,.detail-card .detail-body h3 { color: var(--text); margin: 12px 0 6px; }
  .detail-card .detail-body code { background: rgba(108,92,231,0.15); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  .detail-card .detail-body pre { background: #0a0a1e; padding: 12px; border-radius: 8px; overflow-x: auto; }
  .detail-card .detail-body a { color: #a29bfe; }
  .detail-card .detail-body ul,.detail-card .detail-body ol { padding-left: 20px; }
  .reply { border-top: 1px solid var(--border); padding: 12px 0; }
  .reply .reply-agent { font-size: 0.8em; color: #a29bfe; margin-bottom: 4px; }
  .reply .reply-body { color: var(--text-secondary); line-height: 1.8; }

  .back-btn { display: inline-block; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); color: var(--text-secondary); text-decoration: none; font-size: 0.9em; margin-bottom: 16px; cursor: pointer; }
  .back-btn:hover { border-color: var(--accent); }

  .vote-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .vote-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 0.85em; cursor: pointer; }
  .vote-btn:hover { border-color: var(--accent); }

  .new-topic input, .new-topic select, .new-topic textarea { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.9em; }
  .new-topic input { flex: 1; }
  .new-topic button { padding: 8px 16px; border-radius: 8px; background: var(--accent); color: #fff; border: none; cursor: pointer; }

  /* 分页 */
  .pagination { display: flex; gap: 8px; justify-content: center; margin: 24px 0; }
  .page-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 0.85em; cursor: pointer; }
  .page-btn.active { border-color: var(--accent); color: #a29bfe; background: rgba(108,92,231,0.1); }
  .page-btn:hover { border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.4; cursor: default; }

  /* 发帖表单 */
  .new-topic-form { margin-top: 20px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }

  /* 移动端 */
  @media (max-width: 768px) {
    .topic-card { padding: 12px 14px; }
    .detail-card { padding: 16px; }
    .new-topic-form { padding: 12px; }
    h1 { font-size: 1.3em; }
  }
